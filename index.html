<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Cabinet</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #1D9E75;
      --green-light: #e8f7f2;
      --green-dark: #157a5a;
      --bg: #f5f6f8;
      --surface: #ffffff;
      --border: #e2e6ea;
      --text: #1a1f2e;
      --text-muted: #6b7280;
      --sidebar-width: 220px;
      --header-height: 60px;
      --radius: 10px;
      --shadow: 0 1px 4px rgba(0,0,0,0.07);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      height: var(--header-height);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 12px;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
    }

    .logo-mark {
      width: 32px; height: 32px;
      background: var(--green);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }

    .logo-mark svg { width: 18px; height: 18px; fill: white; }

    .logo-text {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
      color: var(--text);
    }

    .logo-text span {
      color: var(--green);
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .badge-demo {
      font-size: 11px;
      font-weight: 500;
      background: var(--green-light);
      color: var(--green-dark);
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid rgba(29,158,117,0.2);
    }

    .avatar {
      width: 32px; height: 32px;
      background: var(--green);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: white;
    }

    /* ── Layout ── */
    .layout {
      display: flex;
      margin-top: var(--header-height);
      min-height: calc(100vh - var(--header-height));
    }

    /* ── Sidebar ── */
    aside {
      width: var(--sidebar-width);
      background: var(--surface);
      border-right: 1px solid var(--border);
      position: fixed;
      top: var(--header-height);
      left: 0;
      bottom: 0;
      padding: 20px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .nav-section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      padding: 8px 10px 4px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      transition: background 0.15s, color 0.15s;
      user-select: none;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .nav-item:hover {
      background: var(--bg);
      color: var(--text);
    }

    .nav-item.active {
      background: var(--green-light);
      color: var(--green-dark);
      font-weight: 600;
    }

    .nav-item.active .nav-icon { color: var(--green); }

    .nav-icon {
      width: 18px; height: 18px;
      flex-shrink: 0;
    }

    /* ── Main content ── */
    main {
      margin-left: var(--sidebar-width);
      flex: 1;
      padding: 32px 32px;
      max-width: 100%;
    }

    /* ── Views ── */
    .view { display: none; }
    .view.active { display: block; }

    .page-header {
      margin-bottom: 28px;
    }

    .page-header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.4px;
      color: var(--text);
    }

    .page-header p {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ── Placeholder card ── */
    .placeholder-card {
      background: var(--surface);
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      padding: 60px 40px;
      text-align: center;
      color: var(--text-muted);
    }

    .placeholder-card .placeholder-icon {
      width: 48px; height: 48px;
      background: var(--green-light);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
    }

    .placeholder-card .placeholder-icon svg {
      width: 24px; height: 24px;
      stroke: var(--green);
      fill: none;
    }

    .placeholder-card h2 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .placeholder-card p {
      font-size: 14px;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <span class="logo-text">Cabinet<span>AI</span></span>
    <div class="header-right">
      <span class="badge-demo">Démo</span>
      <div class="avatar">RC</div>
    </div>
  </header>

  <div class="layout">

    <!-- Sidebar -->
    <aside>
      <div class="nav-section-label">Navigation</div>

      <button class="nav-item active" data-view="dossier">
        <svg class="nav-icon" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2">
          <path d="M3 7a2 2 0 012-2h3l2 2h9a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/>
        </svg>
        Dossier
      </button>

      <button class="nav-item" data-view="portefeuille">
        <svg class="nav-icon" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2">
          <rect x="2" y="7" width="20" height="14" rx="2"/>
          <path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/>
        </svg>
        Portefeuille
      </button>
    </aside>

    <!-- Main -->
    <main>

      <!-- Vue Dossier -->
      <div class="view active" id="view-dossier">
        <div class="page-header">
          <h1>Dossier client</h1>
          <p>Fiche détaillée d'un client du cabinet</p>
        </div>
        <div class="placeholder-card">
          <div class="placeholder-icon">
            <svg viewBox="0 0 24 24" stroke-width="2"><path d="M3 7a2 2 0 012-2h3l2 2h9a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>
          </div>
          <h2>Vue Dossier</h2>
          <p>Le contenu de cette vue sera défini à la prochaine étape.</p>
        </div>
      </div>

      <!-- Vue Portefeuille -->
      <div class="view" id="view-portefeuille">
        <div class="page-header">
          <h1>Portefeuille clients</h1>
          <p>Vue d'ensemble du portefeuille du cabinet</p>
        </div>
        <div class="placeholder-card">
          <div class="placeholder-icon">
            <svg viewBox="0 0 24 24" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/></svg>
          </div>
          <h2>Vue Portefeuille</h2>
          <p>Le contenu de cette vue sera défini à la prochaine étape.</p>
        </div>
      </div>

    </main>
  </div>

  <script>
    const navItems = document.querySelectorAll('.nav-item[data-view]');
    const views = document.querySelectorAll('.view');

    navItems.forEach(item => {
      item.addEventListener('click', () => {
        const target = item.dataset.view;

        navItems.forEach(n => n.classList.remove('active'));
        views.forEach(v => v.classList.remove('active'));

        item.classList.add('active');
        document.getElementById('view-' + target).classList.add('active');
      });
    });
  </script>

</body>
</html>
